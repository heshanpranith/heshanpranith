name: Generate Green Snake Animation

on:
  schedule:
    # Runs automatically every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch: # Allows you to trigger it manually anytime

# Explicitly grant write permissions to push the generated image
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Step 1: Checkout the repository first so Git commands work
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Generate the black snake with green grid dots
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: heshanpranith
          outputs: |
            dist/github-snake-green.svg?color_snake=#000000&color_dots=#dcfce7,#86efac,#4ade80,#22c55e,#15803d
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Push the generated image to the output branch
      - name: Push to GitHub output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
